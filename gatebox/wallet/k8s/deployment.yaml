apiVersion: apps/v1
kind: Deployment
metadata:
  name: "wallet"
  labels:
    app: "wallet"
spec:
  selector:
    matchLabels:
      app: "wallet"
  replicas: 1
  template:
    metadata:
      labels:
        app: "wallet"
    spec:
      containers:
        - name: "wallet"
          image: registry.localhost:5000/wallet:v0.01
          imagePullPolicy: Always

          ports:
          - containerPort: 8181
          resources:
            requests:
              cpu: 100m
              memory: 64Mi
            limits:
              cpu: 300m
              memory: 256Mi

