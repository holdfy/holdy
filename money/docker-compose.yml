# Infraestrutura unificada para projetos em `money/`:
# - Postgres único (5432): databases apicash, banco_saczuck, dubai-cash
# - Redis 6379, Pulsar 4.x standalone (6650 broker / admin 8080): partilhados por todas as apps
#
# Uso na raiz desta pasta:
#   docker compose up -d
#   docker compose --profile tools up -d   # inclui pgAdmin
#
# Variáveis opcionais: copiar `.env.example` para `.env` ou definir no ambiente.

name: money-infra

services:
  # --- Postgres único (APICash + Banco + Gatebox) ---
  postgres:
    image: postgres:16-alpine
    container_name: apicash-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-apicash}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-apicash}
      POSTGRES_DB: ${POSTGRES_DB:-apicash}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - apicash_pg_data:/var/lib/postgresql/data
    networks:
      - money_infra
    command:
      - "postgres"
      - "-c"
      - "max_connections=200"
      - "-c"
      - "shared_buffers=256MB"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-apicash} -d ${POSTGRES_DB:-apicash}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  redis:
    image: redis:7-alpine
    container_name: apicash-redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - apicash_redis_data:/data
    command: ["redis-server", "--appendonly", "yes"]
    networks:
      - money_infra
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  # NATS JetStream — backend alternativo ao Pulsar (~50 MB RAM vs 2 GB).
  # Para usar: MESSAGING_BACKEND=nats + NATS_URL=nats://127.0.0.1:4222 no .env
  nats:
    image: nats:2.10-alpine
    container_name: apicash-nats
    restart: unless-stopped
    command: ["--jetstream", "--store_dir=/data", "-m", "8222"]
    ports:
      - "${NATS_PORT:-4222}:4222"
      - "${NATS_MONITOR_PORT:-8222}:8222"
    volumes:
      - apicash_nats_data:/data
    networks:
      - money_infra
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8222/healthz || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 5

  # Pulsar (JVM, 2 GB RAM) — descomente quando precisar em produção futura.
  # Para ativar: MESSAGING_BACKEND=pulsar + APICASH_PULSAR__SERVICE_URL=pulsar://host:6650
  #
  # pulsar:
  #   image: apachepulsar/pulsar:4.1.3
  #   container_name: apicash-pulsar
  #   restart: unless-stopped
  #   command: ["/bin/bash", "-c", "bin/pulsar standalone"]
  #   ports:
  #     - "${PULSAR_BROKER_PORT:-6650}:6650"
  #     - "${PULSAR_ADMIN_PORT:-8080}:8080"
  #   volumes:
  #     - apicash_pulsar_data:/pulsar/data
  #   networks:
  #     - money_infra
  #   environment:
  #     PULSAR_MEM: "-Xms512m -Xmx512m -XX:MaxDirectMemorySize=256m"
  #   healthcheck:
  #     test: ["CMD-SHELL", "curl -sf http://localhost:8080/admin/v2/clusters || exit 1"]
  #     interval: 15s
  #     timeout: 10s
  #     retries: 15
  #     start_period: 90s

  mongodb:
    image: mongo:7
    container_name: apicash-mongodb
    restart: unless-stopped
    environment:
      MONGO_INITDB_DATABASE: ${MONGODB_DB:-apicash_wa}
    ports:
      - "${MONGODB_PORT:-27017}:27017"
    volumes:
      - apicash_mongodb_data:/data/db
    networks:
      - money_infra
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:RELEASE.2024-11-07T00-52-20Z
    container_name: apicash-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-holdfy}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-holdfy123}
    ports:
      - "${MINIO_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - apicash_minio_data:/data
    networks:
      - money_infra
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio-init:
    image: minio/mc:RELEASE.2024-11-17T19-35-25Z
    container_name: apicash-minio-init
    depends_on:
      minio:
        condition: service_healthy
    networks:
      - money_infra
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 ${MINIO_ACCESS_KEY:-holdfy} ${MINIO_SECRET_KEY:-holdfy123};
        mc mb --ignore-existing local/${MINIO_BUCKET:-holdfy-images};
        mc anonymous set public local/${MINIO_BUCKET:-holdfy-images};
        exit 0
      "

  pgadmin:
    image: dpage/pgadmin4:8.14
    container_name: apicash-pgadmin
    restart: unless-stopped
    profiles: ["tools"]
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@apicash.local}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-admin}
      PGADMIN_CONFIG_SERVER_MODE: "False"
    ports:
      - "${PGADMIN_PORT:-5050}:80"
    volumes:
      - apicash_pgadmin_data:/var/lib/pgadmin
    networks:
      - money_infra
    depends_on:
      postgres:
        condition: service_healthy

networks:
  money_infra:
    driver: bridge
    name: money_infra

volumes:
  apicash_pg_data:
  apicash_redis_data:
  apicash_nats_data:
  apicash_pgadmin_data:
  apicash_minio_data:
  apicash_mongodb_data:
  # apicash_pulsar_data:  # descomentado junto com o serviço pulsar acima
