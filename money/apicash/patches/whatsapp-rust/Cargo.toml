[package]
edition = "2024"
name = "whatsapp-rust"
version = "0.6.0"
authors = ["João Lucas <jlucaso@hotmail.com>"]
build = false
autolib = false
autobins = false
autoexamples = false
autotests = false
autobenches = false
description = "Rust client for WhatsApp Web"
readme = "README.md"
license = "MIT"
repository = "https://github.com/jlucaso1/whatsapp-rust"

[features]
danger-skip-tls-verify = ["whatsapp-rust-tokio-transport?/danger-skip-tls-verify"]
debug-diagnostics = ["wacore/debug-diagnostics"]
debug-snapshots = ["wacore/debug-snapshots"]
default = [
    "moka-cache",
    "simd",
    "sqlite-storage",
    "tokio-transport",
    "tokio-runtime",
    "ureq-client",
    "tokio-native",
    "signal",
]
moka-cache = ["dep:moka"]
signal = [
    "tokio-runtime",
    "tokio/signal",
]
simd = ["wacore/simd"]
sqlite-storage = ["whatsapp-rust-sqlite-storage"]
tokio-native = [
    "tokio-runtime",
    "tokio/rt-multi-thread",
]
tokio-runtime = ["dep:tokio"]
tokio-transport = ["dep:whatsapp-rust-tokio-transport"]
ureq-client = ["dep:whatsapp-rust-ureq-http-client"]

[lib]
name = "whatsapp_rust"
path = "src/lib.rs"

[[bin]]
name = "whatsapp-rust"
path = "src/main.rs"

[[example]]
name = "benchmark"
path = "examples/benchmark.rs"
required-features = ["danger-skip-tls-verify"]

[[test]]
name = "handshake_integration"
path = "tests/handshake_integration.rs"

